<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node_Config</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0B0F1A',
                        panel: '#141B2D',
                        burgundy: '#9A1750',
                        purpleAccent: '#6B2FA0',
                        neonGreen: '#00FA9A',
                        neonBlue: '#00E5FF'
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Premium Cam Efekti */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .glass-nav {
            background: rgba(11, 15, 26, 0.9);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Özel Şalter (Toggle) CSS'i */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #6B2FA0;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #6B2FA0;
            box-shadow: 0 0 10px rgba(107, 47, 160, 0.5);
        }

        /* Sayfa Giriş Animasyonu */
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeInUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        /* Toast Animasyonu */
        @keyframes slideDown { 0% { transform: translateY(-100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-navy flex justify-center h-screen overflow-hidden text-gray-200 selection:bg-purpleAccent selection:text-white">

    <div id="toast-container" class="absolute top-5 left-0 w-full flex flex-col items-center z-50 pointer-events-none space-y-2 px-4"></div>

    <div class="w-full max-w-md h-full relative flex flex-col overflow-hidden bg-[#0a0d17] shadow-2xl">
        
        <div class="absolute top-0 right-0 w-64 h-64 bg-neonBlue rounded-full blur-[120px] opacity-10 -mr-20 -mt-20 pointer-events-none"></div>
        <div class="absolute bottom-1/4 left-0 w-64 h-64 bg-purpleAccent rounded-full blur-[120px] opacity-10 pointer-events-none"></div>

        <main class="flex-1 overflow-y-auto no-scrollbar pb-28 p-4 space-y-5 relative z-10">
            
            <header class="flex justify-between items-center bg-white/5 p-3 rounded-2xl border border-white/5 fade-in-up" style="animation-delay: 0.1s;">
                <div class="flex items-center">
                    <i class="fa-solid fa-terminal text-gray-400 mr-2 text-sm"></i>
                    <div>
                        <h1 class="text-sm font-bold text-white tracking-widest uppercase">Config<span class="text-purpleAccent">.sys</span></h1>
                        <p class="text-[9px] text-gray-500 font-mono">ROOT_ACCESS_GRANTED</p>
                    </div>
                </div>
                <div class="text-[10px] font-mono text-gray-400 bg-black/30 px-2 py-1 rounded">v2.4.1</div>
            </header>

            <section class="glass-panel p-4 flex items-center relative overflow-hidden fade-in-up" style="animation-delay: 0.2s;">
                <div class="absolute right-0 top-0 w-24 h-24 bg-purpleAccent/20 rounded-full blur-2xl pointer-events-none"></div>
                
                <div class="w-14 h-14 rounded-full bg-gradient-to-tr from-neonBlue to-purpleAccent p-0.5 mr-4 relative z-10">
                    <div class="w-full h-full bg-navy rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-user-astronaut text-xl text-white"></i>
                    </div>
                    <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-neonGreen border-2 border-navy rounded-full"></div>
                </div>
                
                <div class="relative z-10 flex-1">
                    <h2 class="text-base font-bold text-white">Admin.Node_A</h2>
                    <div class="flex justify-between items-center mt-1">
                        <p class="text-[10px] text-gray-400 font-mono">IP: 192.168.1.104</p>
                        <p class="text-[10px] text-neonGreen font-mono"><i class="fa-solid fa-signal mr-1"></i><span id="ping-text">24ms</span></p>
                    </div>
                </div>
            </section>

            <section class="glass-panel p-4 fade-in-up" style="animation-delay: 0.3s;">
                <h3 class="text-xs font-mono text-gray-400 mb-3 uppercase tracking-widest border-b border-white/5 pb-2"><i class="fa-solid fa-sliders text-neonBlue mr-2"></i>Sistem Tercihleri</h3>
                
                <div class="space-y-4 mt-3">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-200 font-medium">Stealth Mode (Kamuflaj)</p>
                            <p class="text-[9px] text-gray-500 font-mono mt-0.5">Arayüzü izole eder.</p>
                        </div>
                        <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle1" id="toggle1" checked class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-purpleAccent appearance-none cursor-pointer z-10 right-0 transition-all duration-300"/>
                            <label for="toggle1" class="toggle-label block overflow-hidden h-5 rounded-full bg-purpleAccent shadow-[0_0_10px_rgba(107,47,160,0.5)] cursor-pointer transition-colors duration-300"></label>
                        </div>
                    </div>

                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-200 font-medium">Uçtan Uca Şifreleme</p>
                            <p class="text-[9px] text-gray-500 font-mono mt-0.5">AES-256 Veri Koruma</p>
                        </div>
                        <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle2" id="toggle2" checked class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-purpleAccent appearance-none cursor-pointer z-10 right-0 transition-all duration-300"/>
                            <label for="toggle2" class="toggle-label block overflow-hidden h-5 rounded-full bg-purpleAccent shadow-[0_0_10px_rgba(107,47,160,0.5)] cursor-pointer transition-colors duration-300"></label>
                        </div>
                    </div>
                </div>
            </section>

            <section class="glass-panel p-4 border-l-4 border-l-neonGreen relative overflow-hidden fade-in-up" style="animation-delay: 0.4s;">
                <div class="absolute top-0 right-0 w-32 h-32 bg-neonGreen/10 rounded-full blur-2xl pointer-events-none"></div>
                
                <div class="flex justify-between items-start mb-3 relative z-10">
                    <div>
                        <h3 class="text-sm font-bold text-neonGreen mb-0.5"><i class="fa-solid fa-stethoscope mr-2"></i>Sağlık Bakanı Modu</h3>
                        <p class="text-[10px] text-gray-400 font-mono">Hedef Cihaz: Gümüşhane_Node</p>
                    </div>
                    <div class="w-2 h-2 rounded-full bg-neonGreen animate-pulse mt-1"></div>
                </div>
                
                <div class="space-y-2.5 relative z-10 mt-4">
                    <button onclick="sendHealthSignal('Su İç!', 'glass-water', '#00E5FF')" class="w-full flex items-center justify-between p-3 rounded-xl bg-black/20 hover:bg-black/40 border border-white/5 hover:border-[#00E5FF]/30 transition-all group">
                        <span class="text-white text-sm font-medium"><i class="fa-solid fa-glass-water text-[#00E5FF] mr-3 w-4 group-hover:scale-110 transition-transform"></i>Hemen Su İç</span>
                        <i class="fa-solid fa-paper-plane text-gray-600 text-xs group-hover:text-[#00E5FF] transition-colors"></i>
                    </button>
                    <button onclick="sendHealthSignal('Dik Otur!', 'chair', '#F59E0B')" class="w-full flex items-center justify-between p-3 rounded-xl bg-black/20 hover:bg-black/40 border border-white/5 hover:border-[#F59E0B]/30 transition-all group">
                        <span class="text-white text-sm font-medium"><i class="fa-solid fa-chair text-[#F59E0B] mr-3 w-4 group-hover:scale-110 transition-transform"></i>Sırtını Dikleştir</span>
                        <i class="fa-solid fa-paper-plane text-gray-600 text-xs group-hover:text-[#F59E0B] transition-colors"></i>
                    </button>
                    <button onclick="sendHealthSignal('Gözlerini Dinlendir!', 'eye', '#00FA9A')" class="w-full flex items-center justify-between p-3 rounded-xl bg-black/20 hover:bg-black/40 border border-white/5 hover:border-[#00FA9A]/30 transition-all group">
                        <span class="text-white text-sm font-medium"><i class="fa-regular fa-eye text-[#00FA9A] mr-3 w-4 group-hover:scale-110 transition-transform"></i>Gözlerini Ekrandan Çek</span>
                        <i class="fa-solid fa-paper-plane text-gray-600 text-xs group-hover:text-[#00FA9A] transition-colors"></i>
                    </button>
                </div>
            </section>

            <section class="fade-in-up" style="animation-delay: 0.5s;">
                <button onclick="sendHealthSignal('Bağlantı Kontrolü (Ping)', 'satellite-dish', '#6B2FA0')" class="w-full py-3.5 rounded-xl bg-purpleAccent/10 text-purple-300 font-mono text-xs border border-purpleAccent/30 hover:bg-purpleAccent/20 active:scale-95 transition-all shadow-[0_0_15px_rgba(107,47,160,0.1)]">
                    <i class="fa-solid fa-wifi mr-2 animate-pulse"></i>HEDEF CİHAZA PING AT
                </button>
            </section>

        </main>

        <nav class="absolute bottom-0 w-full glass-nav pb-6 pt-4 px-6 rounded-t-3xl flex justify-between items-center z-40">
            <a href="/" class="flex flex-col items-center text-gray-500 hover:text-white transition-colors">
                <i class="fa-solid fa-house text-xl mb-1"></i>
            </a>
            <a href="/yemek" class="flex flex-col items-center text-gray-500 hover:text-white transition-colors">
                <i class="fa-solid fa-utensils text-xl mb-1"></i>
            </a>
            
            <a href="/notlar" class="relative -top-5 w-14 h-14 bg-gradient-to-tr from-purpleAccent to-burgundy rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(107,47,160,0.5)] border-4 border-[#0a0d17] hover:scale-105 transition-transform">
                <i class="fa-solid fa-pen text-white text-xl"></i>
            </a>
            
            <a href="/istatistik" class="flex flex-col items-center text-gray-500 hover:text-white transition-colors">
                <i class="fa-solid fa-chart-line text-xl mb-1"></i>
            </a>
            
            <a href="/ayarlar" class="flex flex-col items-center text-purpleAccent scale-110 drop-shadow-[0_0_10px_rgba(107,47,160,0.5)] transition-transform">
                <i class="fa-solid fa-gear text-xl mb-1 animate-[spin_4s_linear_infinite]"></i>
            </a>
        </nav>
    </div>

    <script>
        // Rastgele Ping Animasyonu (Kamuflaj için)
        setInterval(() => {
            const ping = Math.floor(Math.random() * (45 - 18 + 1)) + 18;
            document.getElementById('ping-text').innerText = ping + 'ms';
        }, 3000);

        // Özel Siber Toast Bildirim
        function showToast(message, iconName, color) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            toast.className = `glass-panel flex items-center p-4 rounded-2xl w-full max-w-sm toast-enter border-l-4 shadow-2xl`;
            toast.style.borderLeftColor = color;
            toast.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-black/30 flex items-center justify-center mr-3 border border-white/5">
                    <i class="fa-solid fa-${iconName} text-lg" style="color: ${color}"></i>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-semibold text-white tracking-wide">${message}</p>
                    <p class="text-[9px] font-mono text-gray-400 mt-0.5">PAKET_İLETİLDİ</p>
                </div>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => { 
                toast.style.animation = 'slideDown 0.4s reverse forwards'; 
                setTimeout(() => toast.remove(), 400); 
            }, 3000);
        }

        // Backend Tetikleyici
        async function sendHealthSignal(actionType, icon, color) {
            try {
                // Eğer ping komutuysa ön ek ekleme, sağlık komutuysa SAĞLIK ekle
                const finalAction = actionType.includes('Ping') ? "SİSTEM: Ping Gönderildi" : "SAĞLIK: " + actionType;
                
                const response = await fetch('/api/trigger', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: finalAction })
                });
                
                const data = await response.json();
                
                if(data.status === 'success') {
                    if(actionType.includes('Ping')) {
                        showToast(`Ping başarılı (24ms)`, icon, color);
                    } else {
                        showToast(`[${actionType}] uyarıldı!`, icon, color);
                    }
                }
            } catch (error) { 
                showToast("Sunucuya ulaşılamadı!", "triangle-exclamation", "#FF3366"); 
            }
        }
    </script>
</body>
</html>
